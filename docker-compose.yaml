services:
  kafka:
    image: apache/kafka:4.1.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      # Identificador del nodo Kafka
      KAFKA_NODE_ID: 1

      # Este nodo hace de broker y controller
      KAFKA_PROCESS_ROLES: broker,controller

      # Puertos internos de Kafka con 3 listeners: interno, externo y controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092

      # Dirección que Kafka entrega a los clientes - Cada listener anuncia una dirección distinta según quién lo use
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092

      # Listener usado para KRaft
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Mapa de protocolos
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT

      # Este listener es el que usan los brokers entre sí (interno)
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # Controller del clúster KRaft
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      # Configuración para un único broker
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      # Evita esperas al crear consumer groups
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    volumes:
      - kafka-data:/var/lib/kafka/data


  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8081:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092


volumes:
  kafka-data: